name: Deploy to GitHub Pages
on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

env:
    CARGO_TERM_COLOR: always

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install stable toolchain + WASM target
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: wasm32-unknown-unknown

            - name: Cache cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/bin/
                      ~/.cargo/registry/index/
                      ~/.cargo/registry/cache/
                      ~/.cargo/git/db/
                      target/
                  key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.toml') }}

            - name: Install Linux dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    g++ pkg-config \
                    libx11-dev libasound2-dev libudev-dev \
                    libwayland-dev libxkbcommon-dev libxkbcommon-x11-0

            - name: Install wasm-bindgen-cli
              run: cargo install wasm-bindgen-cli --version 0.2.104 --locked

            - name: Build for WASM
              run: cargo build --release --target wasm32-unknown-unknown

            - name: Generate JS bindings
              run: |
                  wasm-bindgen --out-dir web/wasm --target web \
                    target/wasm32-unknown-unknown/release/LifeView.wasm

            - name: Copy assets
              run: |
                  rm -rf web/assets
                  cp -r assets web/assets

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: web/

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
