name: Build and Deploy to Web Branch
on:
    push:
        branches: ["main"]
    workflow_dispatch:

permissions:
    contents: write

concurrency:
    group: "web-deploy"
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install stable toolchain + WASM target
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: wasm32-unknown-unknown

            - name: Cache cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/bin/
                      ~/.cargo/registry/index/
                      ~/.cargo/registry/cache/
                      ~/.cargo/git/db/
                      target/
                  key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}

            - name: Install wasm-bindgen-cli
              run: cargo install wasm-bindgen-cli --version 0.2.104 --locked --force

            - name: Build for WASM
              run: cargo build --release --target wasm32-unknown-unknown --locked

            - name: Create index.html
              run: |
                  mkdir -p web/wasm web/assets
                  printf '%s\n' '<!doctype html>' '<html lang="en">' '  <head><meta charset="UTF-8"><title>LifeView</title>' '    <style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;background:#000;overflow:hidden}canvas#bevy{width:100%;height:100%;display:block}</style>' '  </head>' '  <body><canvas id="bevy"></canvas><script type="module">import init from "./wasm/LifeView.js";await init();</script></body>' '</html>' > web/index.html

            - name: Generate JS bindings
              run: |
                  wasm-bindgen --out-dir web/wasm --target web \
                    target/wasm32-unknown-unknown/release/LifeView.wasm

            - name: Copy assets
              run: |
                  cp -r assets web/assets

            - name: Create deployment
              uses: actions/github-script@v7
              with:
                result-encoding: string
                script: |
                  const response = await github.rest.repos.createDeployment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: context.payload.ref || context.sha,
                    environment: 'production',
                    auto_merge: false,
                    required_contexts: [],
                    production_environment: true
                  });
                  return response.data.id;
              id: create-deployment

            - name: Set deployment status to success
              uses: actions/github-script@v7
              with:
                script: |
                  github.rest.repos.createDeploymentStatus({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    deployment_id: ${{ steps.create-deployment.outputs.result }},
                    state: 'success',
                    log_url: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
                  })
