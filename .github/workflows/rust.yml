name: Build and Deploy to Web Branch
on:
    push:
        branches: ["main"]
    workflow_dispatch:

permissions:
    contents: write

concurrency:
    group: "web-deploy"
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install stable toolchain + WASM target
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: wasm32-unknown-unknown

            - name: Cache cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/bin/
                      ~/.cargo/registry/index/
                      ~/.cargo/registry/cache/
                      ~/.cargo/git/db/
                      target/
                  key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}

            - name: Install wasm-bindgen-cli
              run: cargo install wasm-bindgen-cli --version 0.2.104 --locked

            - name: Build for WASM
              run: cargo build --release --target wasm32-unknown-unknown --locked

            - name: Generate JS bindings
              run: |
                  rm -rf web/wasm/*
                  wasm-bindgen --out-dir web/wasm --target web \
                    target/wasm32-unknown-unknown/release/LifeView.wasm

            - name: Copy assets
              run: |
                  rm -rf web/assets
                  cp -r assets web/assets

            - name: Deploy to web branch
              uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: web
                  destination_dir: .
                  publish_branch: web
